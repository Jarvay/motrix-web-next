name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: motrix-web-next

jobs:
  # ── Generate shared timestamp ──────────────────────────────────────
  tags:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.gen.outputs.timestamp }}
    steps:
      - name: Generate timestamp
        id: gen
        run: |
          DT="$(TZ=Asia/Shanghai date +%Y%m%d%H%M)"
          echo "timestamp=${DT}" >> "$GITHUB_OUTPUT"

  # ── Build each arch on its native runner (no QEMU!) ───────────────
  build:
    needs: tags
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            arch: amd64
          - platform: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          TIMESTAMP="${{ needs.tags.outputs.timestamp }}"

          TAGS="${IMAGE}:build-${TIMESTAMP}-${{ matrix.arch }}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USE_USTC_MIRROR=${{ vars.USE_USTC_MIRROR }}
            USE_NPM_MIRROR=${{ vars.USE_NPM_MIRROR }}

  # ── Merge per-arch images into a single multi-arch manifest ────────
  merge:
    needs: [tags, build]
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          TIMESTAMP="${{ needs.tags.outputs.timestamp }}"
          SRC_AMD64="${IMAGE}:build-${TIMESTAMP}-amd64"
          SRC_ARM64="${IMAGE}:build-${TIMESTAMP}-arm64"

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            MAJOR="${VERSION%%.*}"
            MINOR="${VERSION%.*}"
            TAGS="${IMAGE}:${VERSION} ${IMAGE}:${MAJOR}.${MINOR#*.} ${IMAGE}:${MAJOR}"
          else
            TAGS="${IMAGE}:${TIMESTAMP} ${IMAGE}:latest"
          fi

          for TAG in $TAGS; do
            echo "Creating manifest: $TAG"
            docker buildx imagetools create -t "$TAG" "$SRC_AMD64" "$SRC_ARM64"
          done