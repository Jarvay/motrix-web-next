name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        run: npx vite build

  backend:
    name: Backend Quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Suppress Ubuntu 24.04 needrestart daemon (auto-restarts services on
      # package install, can kill the runner agent and cause "operation canceled").
      - name: Install system dependencies
        run: |
          export NEEDRESTART_SUSPEND=1
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo -E apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Clippy lint
        working-directory: src-tauri
        run: cargo clippy --no-default-features --features web --lib --bin motrix-web-next -- -D warnings

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --no-default-features --features web --lib --bin motrix-web-next

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --no-default-features --features web --lib --bin motrix-web-next